name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # stdlib-only: no `pip install` step needed.
      - name: Byte-compile deterministic helpers
        run: python -m py_compile scripts/*.py
      - name: Unit tests (determinism + contract checks)
        run: python -m unittest discover -s tests
      - name: fingerprint CLI smoke
        run: |
          python scripts/fingerprint.py source C A B
          python scripts/fingerprint.py name "My-Project_42"
      - name: Validate bundled artifacts
        run: python scripts/validate_projectgenome.py .
